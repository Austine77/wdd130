    <link rel="preconnect" href="https://fonts.googleapis.com">

    <!-- Wrap styles inside a proper <style> tag -->
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }
        header.hero-header, footer {
            background-color: #460668; /* Adjusted color for contrast */
            color: white;
            padding: 20px;
            text-align: center;
        }
        nav a {
            color: rgb(245, 248, 250);
            text-decoration: none;
            margin: 0 10px;

        nav a:hover {
            text-decoration: underline;
        }
        .hero-header .logo {

        footer .social-media a {
            margin: 0 10px;
        }
        footer .social-media img {
            width: 30px;

        }
        footer p {
            margin-top: 10px;
        }
        .contact-info {
            margin: 20px;
            text-align: center;
        }
        .contact-form {
            margin: 20px;
        }
        .contact-form form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .contact-form form input, .contact-form form textarea, .contact-form form button {
            padding: 10px;
            font-size: 1rem;
            width: 100%;
            max-width: 500px;

        }
        .contact-form button {
            background-color: #45044c;

            border: none;
            cursor: pointer;

        }

            justify-content: center;
            flex-wrap: wrap;

        }
        .employee-profiles img {
            width: 150px;
            height: 150px;
